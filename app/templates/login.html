<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BalansiQ</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}?v=11">
    <style>
        body {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 2.5rem 2.25rem;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 380px;
        }
        .login-brand {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .login-brand h1 {
            font-size: 1.3rem;
            color: #2c3e50;
            margin-bottom: .25rem;
        }
        .login-brand p {
            font-size: .85rem;
            color: #7f8c8d;
            margin: 0;
        }
        .login-form .form-group {
            margin-bottom: 1rem;
        }
        .login-form label {
            display: block;
            font-size: .85rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: .3rem;
        }
        .login-form input {
            width: 100%;
            padding: .65rem .8rem;
            border: 1px solid #dde2e6;
            border-radius: 6px;
            font-size: .95rem;
            box-sizing: border-box;
            transition: border-color .15s;
        }
        .login-form input:focus {
            outline: none;
            border-color: #2980b9;
        }
        .login-form .btn-login {
            width: 100%;
            padding: .7rem;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: .5rem;
            transition: background .15s;
        }
        .login-form .btn-login:hover { background: #1a5276; }
        .login-error {
            background: #fadbd8;
            color: #922b21;
            padding: .65rem .8rem;
            border-radius: 6px;
            font-size: .85rem;
            margin-bottom: 1rem;
        }
        .login-foot {
            text-align: center;
            font-size: .75rem;
            color: #95a5a6;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <h1>BalansiQ</h1>
            <p>Sistem Informasi Akuntansi · Silakan login</p>
        </div>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login" class="login-form">
            <input type="hidden" name="next" value="{{ next or '/' }}">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus
                       autocomplete="username"
                       value="{{ username or '' }}">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required
                       autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login">Masuk</button>
        </form>

        <p class="login-foot">Kelompok 1 — Pengantar Akuntansi JTK D3C</p>
    </div>
</body>
</html>
